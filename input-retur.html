<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring PPS Toko - Input Market Retur</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen py-6 px-4">

    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-md p-6">
        <div class="flex justify-end gap-2 mb-4">
            <a href="index.html" class="bg-gray-600 hover:bg-gray-700 text-white font-medium py-2 px-4 rounded-lg text-sm transition shadow">📊 Dashboard Harian</a>
            <a href="input-pps.html" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg text-sm transition shadow">📈 Form Input PPS</a>
        </div>
        
        <h2 class="text-2xl font-bold text-center text-red-600 mb-6 uppercase tracking-wider">Form Input Market Retur</h2>
        
        <form id="returForm" class="space-y-6">
            <!-- 1. Data Absensi & Shift -->
            <div class="bg-blue-50 p-4 rounded-lg border border-blue-200">
                <h3 class="text-sm font-semibold text-blue-700 uppercase mb-3">1. Identitas & Shift</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Tanggal</label>
                        <input type="date" id="tanggal" required class="w-full p-2 border rounded-md focus:ring-2 focus:ring-red-400 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Shift</label>
                        <select id="shift" required class="w-full p-2 border rounded-md focus:ring-2 focus:ring-red-400 outline-none">
                            <option value="">Pilih Shift</option>
                            <option value="Shift 1">Shift 1</option>
                            <option value="Shift 2">Shift 2</option>
                            <option value="Shift 3">Shift 3</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Nama Staf</label>
                        <select id="staf" required class="w-full p-2 border rounded-md focus:ring-2 focus:ring-red-400 outline-none">
                            <option value="">Pilih Staf</option>
                            <option value="Mahmujiono">Mahmujiono</option>
                            <option value="Gerasdi triviali">Gerasdi triviali</option>
                            <option value="Sendy pangestu trimargono">Sendy pangestu trimargono</option>
                            <option value="Yuni ratnasari">Yuni ratnasari</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Nama Crew</label>
                        <select id="crew" required class="w-full p-2 border rounded-md focus:ring-2 focus:ring-red-400 outline-none">
                            <option value="">Pilih Crew</option>
                            <option value="M. syawal taufiqurohman">M. syawal taufiqurohman</option>
                            <option value="Inggih satria putra">Inggih satria putra</option>
                            <option value="Sefri sabariono">Sefri sabariono</option>
                            <option value="Fajri aprilianto">Fajri aprilianto</option>
                            <option value="Ardinta dwi kurniati">Ardinta dwi kurniati</option>
                            <option value="Nadien cintania putri">Nadien cintania putri</option>
                            <option value="Mahfudin panca khikma">Mahfudin panca khikma</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 2. Monitoring Market Retur -->
            <div class="bg-red-50 p-4 rounded-lg border border-red-200">
                <h3 class="text-sm font-semibold text-red-700 uppercase mb-3">2. Data Market Retur</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Kategori Retur</label>
                        <select id="kategoriRetur" required class="w-full p-2 border rounded-md focus:ring-2 focus:ring-red-400 outline-none">
                            <option value="">Pilih Kategori</option>
                            <option value="Tidak Ada Retur">Tidak Ada Retur</option>
                            <option value="Expired">Expired</option>
                            <option value="Rusak/Cacat / BKE">Rusak/Cacat / BKE</option>
                            <option value="Packaging Rusak">Packaging Rusak</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Nomor Faktur</label>
                        <input type="text" id="fakturRetur" placeholder="Contoh: R-G26-0011" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-red-400 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Nilai Retur (Rp)</label>
                        <input type="number" id="nilaiRetur" min="0" placeholder="0" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-red-400 outline-none">
                    </div>
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow">
                SIMPAN DATA RETUR
            </button>
        </form>
    </div>

    <script>
        // Ganti dengan URL Google Apps Script Anda yang terbaru
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwSzRb3Fh-Bjlb7V8abHTH2JQa5iVWzokB7e3hbcWa6zuZd0zQ_xEe7_j3Ff2JvnldT/exec";

        document.getElementById('returForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btnSubmit = document.getElementById('btnSubmit');
            btnSubmit.disabled = true;
            btnSubmit.innerText = "Sedang Menyimpan...";
            btnSubmit.className = "w-full bg-gray-400 text-white font-bold py-3 px-4 rounded-lg cursor-not-allowed";

            const formData = {
                jenis_form: "RETUR", // Penanda ini form Retur
                tanggal: document.getElementById('tanggal').value,
                shift: document.getElementById('shift').value,
                staf: document.getElementById('staf').value,
                crew: document.getElementById('crew').value,
                kategoriRetur: document.getElementById('kategoriRetur').value, 
                fakturRetur: document.getElementById('fakturRetur').value || "-", 
                nilaiRetur: Number(document.getElementById('nilaiRetur').value || 0) 
            };

            fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(formData)
            })
            .then(() => {
                alert("Data Retur Berhasil Disimpan!");
                document.getElementById('returForm').reset();
            })
            .catch(error => {
                console.error("Error:", error);
                alert("Terjadi kesalahan saat menyimpan data.");
            })
            .finally(() => {
                btnSubmit.disabled = false;
                btnSubmit.innerText = "SIMPAN DATA RETUR";
                btnSubmit.className = "w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow";
            });
        });
    </script>
</body>
</html>
