<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring PPS Toko</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen py-6 px-4">

    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-md p-6">
        <div class="flex justify-end gap-2 mb-4">
    <a href="dashboard.html" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg text-sm transition shadow">📊 Dashboard</a>
    <a href="leaderboard.html" class="bg-amber-500 hover:bg-amber-600 text-white font-medium py-2 px-4 rounded-lg text-sm transition shadow">🏆 Leaderboard</a>
</div>
        <h2 class="text-2xl font-bold text-center text-blue-600 mb-6 uppercase tracking-wider">Form Input Monitoring PPS</h2>
        
        <div class="flex justify-end mb-4">
    <a href="dashboard.html" class="bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded-lg text-sm transition shadow">
        👁️ Lihat Dashboard Analitik
    </a>
</div>

        <form id="ppsForm" class="space-y-6">
            <div class="bg-blue-50 p-4 rounded-lg border border-blue-200">
                <h3 class="text-sm font-semibold text-blue-700 uppercase mb-3">1. Data Absensi & Shift</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Tanggal</label>
                        <input type="date" id="tanggal" required class="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-400 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Shift</label>
                        <select id="shift" required class="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-400 outline-none">
                            <option value="">Pilih Shift</option>
                            <option value="Shift 1">Shift 1</option>
                            <option value="Shift 2">Shift 2</option>
                            <option value="Shift 3">Shift 3</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Nama Staf</label>
                        <input type="text" id="staf" placeholder="Nama Staf" required class="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-400 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Nama Crew</label>
                        <input type="text" id="crew" placeholder="Nama Crew" required class="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-400 outline-none">
                    </div>
                </div>
            </div>

            <div class="bg-green-50 p-4 rounded-lg border border-green-200">
                <h3 class="text-sm font-semibold text-green-700 uppercase mb-3">2. Performance Utama</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">SPD (Sales Per Day)</label>
                        <input type="number" id="spd" placeholder="0" required class="w-full p-2 border rounded-md focus:ring-2 focus:ring-green-400 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">STD (Service Trans. Daily)</label>
                        <input type="number" id="std" placeholder="0" required class="w-full p-2 border rounded-md focus:ring-2 focus:ring-green-400 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">APC</label>
                        <input type="number" step="0.01" id="apc" placeholder="0" required class="w-full p-2 border rounded-md focus:ring-2 focus:ring-green-400 outline-none">
                    </div>
                </div>
            </div>

            <div class="bg-yellow-50 p-4 rounded-lg border border-yellow-200">
                <h3 class="text-sm font-semibold text-yellow-700 uppercase mb-3">3. Target Promo & Focus Product</h3>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">PSM</label>
                        <input type="number" id="psm" placeholder="0" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-yellow-400 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">PWP</label>
                        <input type="number" id="pwp" placeholder="0" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-yellow-400 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Serba Gratis</label>
                        <input type="number" id="serbaGratis" placeholder="0" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-yellow-400 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Sueger</label>
                        <input type="number" id="sueger" placeholder="0" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-yellow-400 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Ceban</label>
                        <input type="number" id="ceban" placeholder="0" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-yellow-400 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Beanspot</label>
                        <input type="number" id="beanspot" placeholder="0" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-yellow-400 outline-none">
                    </div>
                </div>
            </div>

            <div class="bg-purple-50 p-4 rounded-lg border border-purple-200">
                <h3 class="text-sm font-semibold text-purple-700 uppercase mb-3">4. Member & NPS</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">New Member</label>
                        <input type="number" id="newMember" placeholder="0" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-purple-400 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">STD Member</label>
                        <input type="number" id="stdMember" placeholder="0" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-purple-400 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">NPS</label>
                        <input type="number" id="nps" placeholder="0" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-purple-400 outline-none">
                    </div>
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow">
                SIMPAN DATA PPS
            </button>
        </form>
    </div>

    <script>
        // GANTI URL DI BAWAH INI DENGAN URL WEB APP DARI GOOGLE APPS SCRIPT ANDA!
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyrYY30xFJK76lZD1sNjEsb1itZZIBfCssUrqd1FMTTwJM_xXqWH0rsTT7vbqy1PJp0/exec";

        document.getElementById('ppsForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btnSubmit = document.getElementById('btnSubmit');
            btnSubmit.disabled = true;
            btnSubmit.innerText = "Sedang Menyimpan...";
            btnSubmit.className = "w-full bg-gray-400 text-white font-bold py-3 px-4 rounded-lg cursor-not-allowed";

            // Mengumpulkan data dari semua input form
            const formData = {
                tanggal: document.getElementById('tanggal').value,
                shift: document.getElementById('shift').value,
                staf: document.getElementById('staf').value,
                crew: document.getElementById('crew').value,
                spd: Number(document.getElementById('spd').value),
                std: Number(document.getElementById('std').value),
                apc: Number(document.getElementById('apc').value),
                psm: Number(document.getElementById('psm').value || 0),
                pwp: Number(document.getElementById('pwp').value || 0),
                serbaGratis: Number(document.getElementById('serbaGratis').value || 0),
                sueger: Number(document.getElementById('sueger').value || 0),
                ceban: Number(document.getElementById('ceban').value || 0),
                newMember: Number(document.getElementById('newMember').value || 0),
                stdMember: Number(document.getElementById('stdMember').value || 0),
                beanspot: Number(document.getElementById('beanspot').value || 0),
                nps: Number(document.getElementById('nps').value || 0)
            };

            // Mengirim data ke Google Sheets melalui API Apps Script
            fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors", // Menggunakan no-cors karena keterbatasan Apps Script
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(formData)
            })
            .then(() => {
                alert("Data Berhasil Disimpan ke Google Sheets!");
                document.getElementById('ppsForm').reset();
            })
            .catch(error => {
                console.error("Error:", error);
                alert("Terjadi kesalahan saat menyimpan data.");
            })
            .finally(() => {
                btnSubmit.disabled = false;
                btnSubmit.innerText = "SIMPAN DATA PPS";
                btnSubmit.className = "w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow";
            });
        });
    </script>
</body>
</html>
